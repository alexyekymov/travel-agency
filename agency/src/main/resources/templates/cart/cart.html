<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title th:text="#{cart.title}">Your cart</title>
    <th:block th:replace="~{fragments/head :: assets}"></th:block>
</head>
<body>

<nav th:replace="~{fragments/header :: header}"></nav>

<main class="py-5">
    <div class="container-fluid">
        <div class="row justify-content-center">
            <div class="col-lg-8">

                <a th:href="@{/}"
                   class="text-uppercase fw-semibold text-success small text-decoration-none mb-4 d-inline-block">&larr;
                    <span th:text="#{detail.back}">Back to tours</span></a>

                <h1 class="h2 mb-4" th:text="#{cart.title}">Your cart</h1>

                <div th:if="${error}" class="alert alert-danger d-flex align-items-center gap-2">
                    <i class="bi bi-exclamation-circle"></i>
                    <span th:text="${error}">Something went wrong.</span>
                </div>

                <div th:if="${cart.items.isEmpty()}"
                     class="text-center text-muted border rounded p-5 my-4">
                    <i class="bi bi-cart3 fs-1 d-block mb-3 text-secondary opacity-50"></i>
                    <span th:text="#{cart.empty}">Your cart is empty.</span>
                    <a th:href="@{/}" class="text-success fw-semibold text-decoration-none" th:text="#{common.browseTours}">Browse tours</a>.
                </div>

                <div th:unless="${cart.items.isEmpty()}" class="card border-0 shadow-sm">
                    <div class="card-body p-0">

                        <div th:each="item : ${cart.items}"
                             class="d-flex flex-wrap align-items-center gap-3 p-3 border-bottom">

                            <div class="ratio ratio-1x1 rounded overflow-hidden flex-shrink-0"
                                 style="width: 5rem">
                                <img th:if="${item.tour.imageName != null}"
                                     class="object-fit-cover"
                                     th:src="@{/images/{name}(name=${item.tour.imageName})}"
                                     th:alt="${item.tour.title}">
                                <div th:unless="${item.tour.imageName != null}"
                                     class="d-flex align-items-center justify-content-center bg-body-secondary text-muted small"
                                     th:text="#{card.noPhoto}">
                                    No photo
                                </div>
                            </div>

                            <div class="flex-grow-1" style="min-width: 8rem">
                                <a th:href="@{/tours/{id}(id=${item.tour.id})}"
                                   class="fw-semibold text-decoration-none text-body"
                                   th:text="${item.tour.title}">Tour title</a>
                                <div class="text-muted small">
                                    <span class="text-muted">$</span><span
                                        th:text="${#numbers.formatInteger(item.tour.price, 1, 'COMMA')}">1,299</span>
                                    <span th:text="#{cart.perSeat}">/ seat</span>
                                </div>
                            </div>

                            <div class="d-inline-flex align-items-center gap-2">
                                <form th:action="@{/cart/update}" method="post" class="m-0">
                                    <input type="hidden" name="tourId" th:value="${item.tour.id}">
                                    <input type="hidden" name="seats" th:value="${item.reservedSeats - 1}">
                                    <button type="submit"
                                            class="btn btn-sm btn-outline-success d-inline-flex align-items-center">
                                        <i class="bi bi-dash-lg"></i>
                                    </button>
                                </form>

                                <form th:action="@{/cart/update}" method="post" class="m-0">
                                    <input type="hidden" name="tourId" th:value="${item.tour.id}">
                                    <input type="number" name="seats" min="0" th:value="${item.reservedSeats}"
                                           class="form-control form-control-sm text-center"
                                           style="width: 4rem" onchange="this.form.submit()">
                                </form>

                                <form th:action="@{/cart/add}" method="post" class="m-0">
                                    <input type="hidden" name="tourId" th:value="${item.tour.id}">
                                    <input type="hidden" name="seats" value="1">
                                    <button type="submit"
                                            class="btn btn-sm btn-outline-success d-inline-flex align-items-center">
                                        <i class="bi bi-plus-lg"></i>
                                    </button>
                                </form>
                            </div>

                            <div class="fw-semibold text-end" style="min-width: 6rem">
                                <span class="text-muted fs-6">$</span><span
                                    th:text="${#numbers.formatInteger(item.lineTotal, 1, 'COMMA')}">2,598</span>
                            </div>

                            <form th:action="@{/cart/remove}" method="post" class="m-0">
                                <input type="hidden" name="tourId" th:value="${item.tour.id}">
                                <button type="submit"
                                        class="btn btn-sm btn-outline-danger d-inline-flex align-items-center">
                                    <i class="bi bi-trash"></i>
                                </button>
                            </form>

                        </div>

                        <div class="d-flex flex-wrap justify-content-between align-items-center gap-3 p-3">
                            <span class="fs-5">
                                <span th:text="#{common.total}">Total</span>:
                                <span class="fw-semibold">
                                    <span class="text-muted fs-6">$</span><span
                                        th:text="${#numbers.formatInteger(cart.total, 1, 'COMMA')}">3,897</span>
                                </span>
                            </span>
                            <form th:action="@{/orders/checkout}" method="post" class="m-0">
                                <button type="submit"
                                        class="btn btn-success text-uppercase fw-semibold d-inline-flex align-items-center gap-2">
                                    <i class="bi bi-bag-check"></i><span th:text="#{cart.checkout}">Checkout</span>
                                </button>
                            </form>
                        </div>

                    </div>
                </div>

            </div>
        </div>
    </div>
</main>

<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
