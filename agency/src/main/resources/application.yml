server:
  port: 8080

spring:
  application:
    name: agency

  messages:
    basename: messages
    encoding: UTF-8
    fallback-to-system-locale: false

  datasource:
    url: ${DB_URL:jdbc:postgresql://localhost:5432/travel-agency}
    driver-class-name: org.postgresql.Driver
    username: ${DB_USERNAME:user}
    password: ${DB_PASSWORD:password}

  data:
    web:
      pageable:
        default-page-size: 12
        max-page-size: 36

  servlet:
    multipart:
      max-file-size: 10MB

logging:
  level:
    dev.overlax.agency.aspect: DEBUG

app:
  upload-dir: ${APP_UPLOAD_DIR:${user.home}/travel-agency-uploads}
  security:
    jwt:
      secret: 404E635263336A586E3272357538782F413F4428472B4B6250645367566B5970
      access: 24
      refresh: 2

