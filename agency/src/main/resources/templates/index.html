<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Travel Agency</title>
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
    <style>
        .sort-select:focus {
            border-color: var(--bs-success);
            box-shadow: 0 0 0 .25rem rgba(var(--bs-success-rgb), .25);
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">Travel Agency</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link active" href="/">Home</a>
                </li>
            </ul>
            <nav class="navbar navbar-light bg-light">
                <form class="container-fluid justify-content-start">
                    <a th:href="@{/auth/sign-in}" class="btn btn-outline-success me-2">Sign in</a>
                    <button class="btn btn-sm btn-outline-secondary" type="button">Sign up</button>
                </form>
            </nav>
        </div>
    </div>
</nav>

<main class="py-5">
    <div class="container-fluid">
        <div class="row justify-content-center">
            <div class="col-lg-8">

                <header class="mb-4 mb-lg-5">
                    <p class="text-uppercase fw-semibold text-success small mb-1">Curated journeys</p>
                    <h1 class="h2 mb-2">Featured Tours</h1>
                    <p class="text-muted mb-0">Hand-picked destinations, ready when you are.</p>
                </header>

                <form method="get" th:action="@{/}"
                      th:with="sort=${param.sort != null ? param.sort[0] : ''}"
                      class="d-flex flex-wrap align-items-end justify-content-between gap-3 mb-4">

                    <!-- filters -->
                    <div class="d-flex flex-wrap align-items-end gap-2">
                        <div>
                            <label for="tourType" class="form-label text-uppercase fw-semibold text-success small mb-1">Tour
                                type</label>
                            <select id="tourType" name="tourType" class="form-select form-select-sm sort-select w-auto">
                                <option value="" th:selected="${filterRequest.tourType() == null}">Any</option>
                                <option th:each="t : ${tourTypes}" th:value="${t}"
                                        th:selected="${filterRequest.tourType() == t}"
                                        th:text="${#strings.capitalizeWords(#strings.replace(#strings.toLowerCase(t), '_', ' '))}">
                                    Leisure
                                </option>
                            </select>
                        </div>
                        <div>
                            <label for="hotelType"
                                   class="form-label text-uppercase fw-semibold text-success small mb-1">Hotel</label>
                            <select id="hotelType" name="hotelType"
                                    class="form-select form-select-sm sort-select w-auto">
                                <option value="" th:selected="${filterRequest.hotelType() == null}">Any</option>
                                <option th:each="h : ${hotelTypes}" th:value="${h}"
                                        th:selected="${filterRequest.hotelType() == h}"
                                        th:text="${#strings.capitalizeWords(#strings.replace(#strings.toLowerCase(h), '_', ' '))}">
                                    Four Stars
                                </option>
                            </select>
                        </div>
                        <div>
                            <label for="transferType"
                                   class="form-label text-uppercase fw-semibold text-success small mb-1">Transfer</label>
                            <select id="transferType" name="transferType"
                                    class="form-select form-select-sm sort-select w-auto">
                                <option value="" th:selected="${filterRequest.transferType() == null}">Any</option>
                                <option th:each="tr : ${transferTypes}" th:value="${tr}"
                                        th:selected="${filterRequest.transferType() == tr}"
                                        th:text="${#strings.capitalizeWords(#strings.replace(#strings.toLowerCase(tr), '_', ' '))}">
                                    Plane
                                </option>
                            </select>
                        </div>
                        <div>
                            <label for="minPrice" class="form-label text-uppercase fw-semibold text-success small mb-1">Min
                                $</label>
                            <input type="number" step="0.01" min="0" id="minPrice" name="minPrice"
                                   th:value="${filterRequest.minPrice()}" placeholder="0"
                                   class="form-control form-control-sm sort-select" style="width: 6rem">
                        </div>
                        <div>
                            <label for="maxPrice" class="form-label text-uppercase fw-semibold text-success small mb-1">Max
                                $</label>
                            <input type="number" step="0.01" min="0" id="maxPrice" name="maxPrice"
                                   th:value="${filterRequest.maxPrice()}" placeholder="Any"
                                   class="form-control form-control-sm sort-select" style="width: 6rem">
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-sm btn-success">
                                Apply
                            </button>
                            <a th:href="@{/(sort=${sort != '' ? sort : null})}"
                               class="btn btn-sm btn-outline-secondary">
                                Clear
                            </a>
                        </div>
                    </div>

                    <!-- sort -->
                    <div>
                        <label for="sort" class="form-label text-uppercase fw-semibold text-success small mb-1">Sort
                            by</label>
                        <select id="sort" name="sort" class="form-select form-select-sm sort-select w-auto"
                                onchange="this.form.submit()">
                            <option value="" th:selected="${sort == ''}">
                                Default
                            </option>
                            <option value="price,asc" th:selected="${sort == 'price,asc'}">
                                Price — low to high
                            </option>
                            <option value="price,desc" th:selected="${sort == 'price,desc'}">
                                Price — high to low
                            </option>
                            <option value="title,asc" th:selected="${sort == 'title,asc'}">
                                Name (A–Z)
                            </option>
                            <option value="title,desc" th:selected="${sort == 'title,desc'}">
                                Name (Z–A)
                            </option>
                        </select>
                    </div>
                </form>

                <div class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 g-4">
                    <div class="col" th:each="tour : ${tours}">
                        <div th:replace="~{fragments/tour-card :: card(${tour})}"></div>
                    </div>
                </div>

                <div th:if="${tours.isEmpty()}" class="text-center text-muted border rounded p-5 my-4">
                    No tours available yet.
                </div>

                <div th:replace="~{fragments/pagination :: pagination(${tours}, '/')}"></div>

            </div>
        </div>
    </div>
</main>


<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
