<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Travel Agency</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <style>
        .sort-select:focus {
            border-color: var(--bs-success);
            box-shadow: 0 0 0 .25rem rgba(var(--bs-success-rgb), .25);
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">Travel Agency</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link active" aria-current="page" href="#">Home</a>
                </li>
            </ul>
            <nav class="navbar navbar-light bg-light">
                <form class="container-fluid justify-content-start">
                    <a th:href="@{/auth/sign-in}" class="btn btn-outline-success me-2">Sign in</a>
                    <button class="btn btn-sm btn-outline-secondary" type="button">Sign up</button>
                </form>
            </nav>
        </div>
    </div>
</nav>

<main class="py-5">
    <div class="container-fluid">
        <div class="row justify-content-center">
            <div class="col-lg-8">

                <header class="mb-4 mb-lg-5">
                    <p class="text-uppercase fw-semibold text-success small mb-1">Curated journeys</p>
                    <h1 class="h2 mb-2">Featured Tours</h1>
                    <p class="text-muted mb-0">Hand-picked destinations, ready when you are.</p>
                </header>

                <form method="get" th:action="@{/}"
                      th:with="sort=${param.sort != null ? param.sort[0] : ''}"
                      class="d-flex flex-wrap align-items-center justify-content-end gap-2 mb-4">
                    <label for="sort" class="text-uppercase fw-semibold text-success small mb-0 me-1">Sort by</label>
                    <select id="sort" name="sort" class="form-select form-select-sm sort-select w-auto"
                            onchange="this.form.submit()">
                        <option value=""           th:selected="${sort == ''}">Default</option>
                        <option value="price,asc"  th:selected="${sort == 'price,asc'}">Price — low to high</option>
                        <option value="price,desc" th:selected="${sort == 'price,desc'}">Price — high to low</option>
                        <option value="title,asc"  th:selected="${sort == 'title,asc'}">Name (A–Z)</option>
                        <option value="title,desc" th:selected="${sort == 'title,desc'}">Name (Z–A)</option>
                    </select>
                    <noscript><button type="submit" class="btn btn-sm btn-outline-success">Apply</button></noscript>
                </form>

                <div class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 g-4">
                    <div class="col" th:each="tour : ${tours}">
                        <div th:replace="~{fragments/tour-card :: card(${tour})}"></div>
                    </div>
                </div>

                <div th:if="${tours.isEmpty()}" class="text-center text-muted border rounded py-5">
                    No tours available yet.
                </div>

                <div th:replace="~{fragments/pagination :: pagination(${tours}, '/')}"></div>

            </div>
        </div>
    </div>
</main>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
</body>
</html>
