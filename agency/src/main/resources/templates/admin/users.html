<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title th:text="#{admin.title}">User management</title>
    <th:block th:replace="~{fragments/head :: assets}"></th:block>
</head>
<body>

<nav th:replace="~{fragments/header :: header}"></nav>

<main class="py-5">
    <div class="container-fluid">
        <div class="row justify-content-center">
            <div class="col-lg-8">

                <div class="mb-4">
                    <h1 class="h2 mb-0" th:text="#{admin.title}">User management</h1>
                </div>

                <div th:if="${users.isEmpty()}" class="text-center text-muted border rounded p-5 my-4"
                     th:text="#{admin.empty}">
                    No users yet.
                </div>

                <div th:unless="${users.isEmpty()}" class="card border-0 shadow-sm">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead>
                            <tr class=" small text-muted">
                                <th scope="col" class="ps-3" th:text="#{admin.col.user}">User</th>
                                <th scope="col" th:text="#{admin.col.roles}">Roles</th>
                                <th scope="col" class="text-center" th:text="#{admin.col.status}">Status</th>
                                <th scope="col" class="text-end pe-3" th:text="#{admin.col.actions}">Actions</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="user : ${users}">

                                <td class="ps-3">
                                    <div class="fw-semibold"
                                         th:text="|${user.firstName} ${user.lastName}|">Jane Doe</div>
                                    <div class="text-muted small" th:text="${user.email}">jane@example.com</div>
                                </td>

                                <td>
                                    <form th:action="@{/admin/users/{id}/roles(id=${user.id})}" method="post"
                                          class="d-flex flex-wrap align-items-center gap-2 m-0">
                                        <th:block th:each="role : ${allRoles}">
                                            <input type="checkbox" class="btn-check" name="roles"
                                                   th:value="${role}"
                                                   th:id="${'role-' + user.id + '-' + role}"
                                                   autocomplete="off"
                                                   th:checked="${user.roles.contains(role)}">
                                            <label class="btn btn-sm btn-outline-success  fw-semibold"
                                                   th:for="${'role-' + user.id + '-' + role}"
                                                   th:text="#{|enum.role.${role}|}">Role</label>
                                        </th:block>
                                        <button type="submit"
                                                class="btn btn-sm btn-success d-inline-flex align-items-center gap-1"
                                                th:title="#{admin.saveRoles}" title="Save roles">
                                            <i class="bi bi-check-lg"></i>
                                        </button>
                                    </form>
                                </td>

                                <td class="text-center">
                                    <span th:if="${user.active}"
                                          class="badge rounded-pill bg-success-subtle text-success-emphasis border border-success-subtle  fw-semibold"
                                          th:text="#{admin.active}">
                                        Active
                                    </span>
                                    <span th:unless="${user.active}"
                                          class="badge rounded-pill bg-danger-subtle text-danger-emphasis border border-danger-subtle  fw-semibold"
                                          th:text="#{admin.blocked}">
                                        Blocked
                                    </span>
                                </td>

                                <td class="text-end pe-3"
                                    th:with="self=${user.id == #authentication.principal.id}">
                                    <form th:if="${user.active}" th:action="@{/admin/users/{id}/block(id=${user.id})}"
                                          method="post" class="m-0">
                                        <button type="submit" th:disabled="${self}"
                                                class="btn btn-sm btn-outline-danger d-inline-flex align-items-center gap-1  fw-semibold">
                                            <i class="bi bi-slash-circle"></i><span th:text="#{admin.block}">Block</span>
                                        </button>
                                    </form>
                                    <form th:unless="${user.active}"
                                          th:action="@{/admin/users/{id}/unblock(id=${user.id})}"
                                          method="post" class="m-0">
                                        <button type="submit" th:disabled="${self}"
                                                class="btn btn-sm btn-outline-success d-inline-flex align-items-center gap-1  fw-semibold">
                                            <i class="bi bi-check-circle"></i><span th:text="#{admin.unblock}">Unblock</span>
                                        </button>
                                    </form>
                                </td>

                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </div>
    </div>
</main>

<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
