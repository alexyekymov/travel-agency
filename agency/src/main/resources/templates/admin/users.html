<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>User management</title>
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{/css/bootstrap-icons.min.css}" rel="stylesheet">
</head>
<body>

<nav th:replace="~{fragments/header :: header}"></nav>

<main class="py-5">
    <div class="container-fluid">
        <div class="row justify-content-center">
            <div class="col-lg-8">

                <div class="mb-4">
                    <p class="text-uppercase fw-semibold text-success small mb-1">Admin</p>
                    <h1 class="h2 mb-0">User management</h1>
                </div>

                <div th:if="${users.isEmpty()}" class="text-center text-muted border rounded p-5 my-4">
                    No users yet.
                </div>

                <div th:unless="${users.isEmpty()}" class="card border-0 shadow-sm">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead>
                            <tr class="text-uppercase small text-muted">
                                <th scope="col" class="ps-3">User</th>
                                <th scope="col">Roles</th>
                                <th scope="col" class="text-center">Status</th>
                                <th scope="col" class="text-end pe-3">Actions</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="user : ${users}">

                                <td class="ps-3">
                                    <div class="fw-semibold"
                                         th:text="|${user.firstName} ${user.lastName}|">Jane Doe</div>
                                    <div class="text-muted small" th:text="${user.email}">jane@example.com</div>
                                </td>

                                <td>
                                    <form th:action="@{/admin/users/{id}/roles(id=${user.id})}" method="post"
                                          class="d-flex flex-wrap align-items-center gap-2 m-0">
                                        <th:block th:each="role : ${allRoles}">
                                            <input type="checkbox" class="btn-check" name="roles"
                                                   th:value="${role}"
                                                   th:id="${'role-' + user.id + '-' + role}"
                                                   autocomplete="off"
                                                   th:checked="${user.roles.contains(role)}">
                                            <label class="btn btn-sm btn-outline-success text-uppercase fw-semibold"
                                                   th:for="${'role-' + user.id + '-' + role}"
                                                   th:text="${#strings.capitalizeWords(#strings.toLowerCase(role))}">Role</label>
                                        </th:block>
                                        <button type="submit"
                                                class="btn btn-sm btn-success d-inline-flex align-items-center gap-1"
                                                title="Save roles">
                                            <i class="bi bi-check-lg"></i>
                                        </button>
                                    </form>
                                </td>

                                <td class="text-center">
                                    <span th:if="${user.active}"
                                          class="badge rounded-pill bg-success-subtle text-success-emphasis border border-success-subtle text-uppercase fw-semibold">
                                        Active
                                    </span>
                                    <span th:unless="${user.active}"
                                          class="badge rounded-pill bg-danger-subtle text-danger-emphasis border border-danger-subtle text-uppercase fw-semibold">
                                        Blocked
                                    </span>
                                </td>

                                <td class="text-end pe-3">
                                    <form th:if="${user.active}" th:action="@{/admin/users/{id}/block(id=${user.id})}"
                                          method="post" class="m-0">
                                        <button type="submit"
                                                class="btn btn-sm btn-outline-danger d-inline-flex align-items-center gap-1 text-uppercase fw-semibold">
                                            <i class="bi bi-slash-circle"></i>Block
                                        </button>
                                    </form>
                                    <form th:unless="${user.active}"
                                          th:action="@{/admin/users/{id}/unblock(id=${user.id})}"
                                          method="post" class="m-0">
                                        <button type="submit"
                                                class="btn btn-sm btn-outline-success d-inline-flex align-items-center gap-1 text-uppercase fw-semibold">
                                            <i class="bi bi-check-circle"></i>Unblock
                                        </button>
                                    </form>
                                </td>

                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

            </div>
        </div>
    </div>
</main>

<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
