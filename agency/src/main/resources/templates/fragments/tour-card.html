<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<body>

<article th:fragment="card(tour)" class="card h-100 border-0 shadow-sm overflow-hidden">

    <div class="position-relative">
        <div class="ratio ratio-4x3">
            <img th:if="${tour.imageName != null}"
                 class="object-fit-cover"
                 th:src="@{/images/{name}(name=${tour.imageName})}"
                 th:alt="${tour.title}">
            <div th:unless="${tour.imageName != null}"
                 class="d-flex align-items-center justify-content-center bg-body-secondary text-muted small">
                No photo
            </div>
        </div>

        <span class="badge text-bg-light border position-absolute top-0 start-0 m-2 text-uppercase fw-semibold"
              th:text="${tour.tourType}">
            Leisure
        </span>
    </div>

    <div class="card-body d-flex flex-column">
        <h5 class="card-title mb-1" th:text="${tour.title}">Tour title</h5>
        <p class="card-text text-muted small"
           th:text="${#strings.abbreviate(tour.description, 90)}">A short description of the trip.</p>

        <div class="d-flex justify-content-between align-items-center small text-muted mt-auto pt-2 border-top">
            <span aria-label="Hotel rating">
                <span th:each="s : ${#numbers.sequence(1, 5)}"
                      th:classappend="${s <= tour.hotelType.ordinal() + 1} ? 'text-warning' : 'text-secondary opacity-25'">
                    &#9733;
                </span>
            </span>
            <span th:text="${#strings.capitalizeWords(#strings.replace(#strings.toLowerCase(tour.transferType), '_', ' '))}">
                Plane
            </span>
        </div>
    </div>

    <div class="card-footer bg-transparent d-flex justify-content-between align-items-center">
        <span class="fs-5 fw-semibold">
            <span class="text-muted fs-6">$</span><span th:text="${#numbers.formatInteger(tour.price, 1, 'COMMA')}">
            1,299
        </span>
        </span>
        <a th:href="@{/{id}(id=${tour.id})}"
           class="btn btn-sm btn-outline-success stretched-link text-uppercase fw-semibold">
            View details
        </a>
    </div>

</article>

</body>
</html>
