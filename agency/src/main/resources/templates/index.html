<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Travel Agency</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container-fluid">
        <a class="navbar-brand" href="#">Travel Agency</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent" aria-controls="navbarSupportedContent" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link active" aria-current="page" href="#">Home</a>
                </li>
            </ul>
            <nav class="navbar navbar-light bg-light">
                <form class="container-fluid justify-content-start">
                    <a th:href="@{/auth/sign-in}" class="btn btn-outline-success me-2">Sign in</a>
                    <button class="btn btn-sm btn-outline-secondary" type="button">Sign up</button>
                </form>
            </nav>
        </div>
    </div>
</nav>

<main class="py-5">
    <div class="container-fluid">
        <div class="row justify-content-center">
            <div class="col-lg-8">

                <header class="mb-4 mb-lg-5">
                    <p class="text-uppercase fw-semibold text-success small mb-1">Curated journeys</p>
                    <h1 class="h2 mb-2">Featured Tours</h1>
                    <p class="text-muted mb-0">Hand-picked destinations, ready when you are.</p>
                </header>

                <div class="row row-cols-1 row-cols-sm-2 row-cols-lg-3 g-4">
                    <div class="col" th:each="tour : ${tours}">
                        <div th:replace="~{fragments/tour-card :: card(${tour})}"></div>
                    </div>
                </div>

                <div th:if="${tours.isEmpty()}" class="text-center text-muted border rounded py-5">
                    No tours available yet.
                </div>

                <nav th:if="${tours.totalPages > 1}" aria-label="Tours pagination" class="mt-5">
                    <ul class="pagination pagination-sm gap-1 justify-content-center"
                        style="--bs-pagination-color: var(--bs-success);
                               --bs-pagination-hover-color: var(--bs-success);
                               --bs-pagination-active-bg: var(--bs-success);
                               --bs-pagination-active-border-color: var(--bs-success)">

                        <li class="page-item" th:if="${tours.hasPrevious()}">
                            <a class="page-link rounded border-0" th:href="@{/(page=${tours.number - 1})}" aria-label="Previous">&laquo;</a>
                        </li>

                        <li class="page-item"
                            th:each="i : ${#numbers.sequence(0, tours.totalPages - 1)}"
                            th:classappend="${i == tours.number} ? 'active'"
                            th:attr="aria-current=${i == tours.number} ? 'page' : null">
                            <a class="page-link rounded border-0" th:href="@{/(page=${i})}" th:text="${i + 1}">1</a>
                        </li>

                        <li class="page-item" th:if="${tours.hasNext()}">
                            <a class="page-link rounded border-0" th:href="@{/(page=${tours.number + 1})}" aria-label="Next">&raquo;</a>
                        </li>

                    </ul>
                </nav>

            </div>
        </div>
    </div>
</main>


<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-C6RzsynM9kWDrMNeT87bh95OGNyZPhcTNXj1NW7RuBCsyN/o0jlpcV8Qyq46cDfL" crossorigin="anonymous"></script>
</body>
</html>
