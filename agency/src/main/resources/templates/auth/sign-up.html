<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title th:text="#{nav.signUp}">Sign up</title>
    <th:block th:replace="~{fragments/head :: assets}"></th:block>
    <style>
        .form-control:focus {
            border-color: var(--bs-success);
            box-shadow: 0 0 0 .25rem rgba(var(--bs-success-rgb), .25);
        }
    </style>
</head>
<body>

<nav th:replace="~{fragments/header :: header}"></nav>

<main class="py-5">
    <div class="container-fluid">
        <div class="row justify-content-center">
            <div class="col-md-7 col-lg-5">

                <div class="card border-0 shadow-sm">
                    <div class="card-body p-4">

                        <h1 class="h3 mb-4" th:text="#{auth.createAccount}">Create your account</h1>

                        <form th:action="@{/auth/sign-up}" th:object="${userRequest}" method="post"
                              class="row g-3" novalidate>

                            <div class="col-12 col-sm-6">
                                <label for="firstName"
                                       class="form-label text-case fw-semibold text-success small mb-1" th:text="#{auth.firstName}">First
                                    name</label>
                                <input type="text" id="firstName" th:field="*{firstName}" class="form-control"
                                       th:errorclass="is-invalid" th:placeholder="#{auth.firstNamePlaceholder}" placeholder="Jane" autocomplete="given-name" required>
                                <div class="invalid-feedback" th:errors="*{firstName}">First name is required.</div>
                            </div>

                            <div class="col-12 col-sm-6">
                                <label for="lastName"
                                       class="form-label text-case fw-semibold text-success small mb-1" th:text="#{auth.lastName}">Last
                                    name</label>
                                <input type="text" id="lastName" th:field="*{lastName}" class="form-control"
                                       th:errorclass="is-invalid" th:placeholder="#{auth.lastNamePlaceholder}" placeholder="Doe" autocomplete="family-name" required>
                                <div class="invalid-feedback" th:errors="*{lastName}">Last name is required.</div>
                            </div>

                            <div class="col-12">
                                <label for="email"
                                       class="form-label text-case fw-semibold text-success small mb-1" th:text="#{auth.email}">Email</label>
                                <input type="email" id="email" th:field="*{email}" class="form-control"
                                       th:errorclass="is-invalid" placeholder="you@example.com" autocomplete="email"
                                       required>
                                <div class="invalid-feedback" th:errors="*{email}">Enter a valid email.</div>
                            </div>

                            <div class="col-12">
                                <label for="password"
                                       class="form-label text-case fw-semibold text-success small mb-1" th:text="#{auth.password}">Password</label>
                                <input type="password" id="password" th:field="*{password}" class="form-control"
                                       th:errorclass="is-invalid" th:placeholder="#{auth.passwordHint}" placeholder="At least 8 characters"
                                       autocomplete="new-password" required>
                                <div class="invalid-feedback" th:errors="*{password}">
                                    Password must be at least 8 characters.
                                </div>
                                <div class="form-text" th:text="#{auth.passwordHelp}">Use 8 or more characters.</div>
                            </div>

                            <div class="col-12">
                                <label for="phoneNumber"
                                       class="form-label text-case fw-semibold text-success small mb-1">
                                    <span th:text="#{auth.phoneNumber}">Phone number</span> <span class="text-muted text-lowercase fw-normal" th:text="#{auth.optional}">(optional)</span>
                                </label>
                                <input type="tel" id="phoneNumber" th:field="*{phoneNumber}" class="form-control"
                                       th:errorclass="is-invalid" placeholder="+1 555 123 4567" autocomplete="tel">
                                <div class="invalid-feedback" th:errors="*{phoneNumber}">Enter a valid phone number.</div>
                            </div>

                            <div class="col-12 mt-4">
                                <button type="submit" class="btn btn-success text-uppercase fw-semibold w-100" th:text="#{nav.signUp}">Sign up
                                </button>
                            </div>

                        </form>

                        <p class="text-muted small text-center mb-0 mt-4">
                            <span th:text="#{auth.haveAccount}">Already have an account?</span>
                            <a th:href="@{/auth/sign-in}"
                               class="text-success fw-semibold text-decoration-none" th:text="#{nav.signIn}">Sign in</a>
                        </p>

                    </div>
                </div>

            </div>
        </div>
    </div>
</main>

<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
