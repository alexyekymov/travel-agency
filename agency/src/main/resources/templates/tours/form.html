<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>New tour</title>
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
    <style>
        .form-control:focus, .form-select:focus {
            border-color: var(--bs-success);
            box-shadow: 0 0 0 .25rem rgba(var(--bs-success-rgb), .25);
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">Travel Agency</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" href="/">Home</a>
                </li>
            </ul>
            <nav class="navbar navbar-light bg-light">
                <form class="container-fluid justify-content-start">
                    <a th:href="@{/auth/sign-in}" class="btn btn-outline-success me-2">Sign in</a>
                    <button class="btn btn-sm btn-outline-secondary" type="button">Sign up</button>
                </form>
            </nav>
        </div>
    </div>
</nav>

<main class="py-5">
    <div class="container-fluid">
        <div class="row justify-content-center">
            <div class="col-lg-6">

                <a th:href="@{/}"
                   class="text-uppercase fw-semibold text-success small text-decoration-none mb-4 d-inline-block">&larr;
                    Back to tours</a>

                <div class="card border-0 shadow-sm">
                    <div class="card-body p-4">

                        <p class="text-uppercase fw-semibold text-success small mb-1">New tour</p>
                        <h1 class="h3 mb-4">Create a tour</h1>

                        <form th:action="@{/tours}" th:object="${tourRequest}"
                              method="post" enctype="multipart/form-data" class="row g-3">

                            <div class="col-12">
                                <label for="title"
                                       class="form-label text-uppercase fw-semibold text-success small mb-1">Title</label>
                                <input type="text" th:field="*{title}" class="form-control" id="title"
                                       placeholder="Title">
                            </div>

                            <div class="col-12">
                                <label for="description"
                                       class="form-label text-uppercase fw-semibold text-success small mb-1">Description</label>
                                <textarea th:field="*{description}" class="form-control" id="description" rows="3"
                                          placeholder="Description"></textarea>
                            </div>

                            <div class="col-md-6">
                                <label for="price"
                                       class="form-label text-uppercase fw-semibold text-success small mb-1">Price</label>
                                <input type="number" th:field="*{price}" class="form-control" id="price" step="0.01"
                                       min="0" placeholder="0.00">
                            </div>
                            <div class="col-md-6">
                                <label for="availableSeats"
                                       class="form-label text-uppercase fw-semibold text-success small mb-1">Available
                                    seats</label>
                                <input type="number" th:field="*{availableSeats}" id="availableSeats" min="0"
                                       class="form-control"
                                       placeholder="0">
                            </div>

                            <div class="col-md-6">
                                <label for="arrivalDate"
                                       class="form-label text-uppercase fw-semibold text-success small mb-1">Arrival
                                    date</label>
                                <input type="date" th:field="*{arrivalDate}" class="form-control" id="arrivalDate">
                            </div>
                            <div class="col-md-6">
                                <label for="evictionDate"
                                       class="form-label text-uppercase fw-semibold text-success small mb-1">Eviction
                                    date</label>
                                <input type="date" th:field="*{evictionDate}" class="form-control" id="evictionDate">
                            </div>

                            <div class="col-md-4">
                                <label for="tourType"
                                       class="form-label text-uppercase fw-semibold text-success small mb-1">
                                    Tour type
                                </label>
                                <select th:field="*{tourType}" class="form-select" id="tourType">
                                    <option value="">Select…</option>
                                    <option th:each="type : ${tourTypes}" th:value="${type}"
                                            th:text="${#strings.capitalizeWords(#strings.replace(#strings.toLowerCase(type), '_', ' '))}">
                                        Leisure
                                    </option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label for="hotelType"
                                       class="form-label text-uppercase fw-semibold text-success small mb-1">Hotel
                                    type</label>
                                <select th:field="*{hotelType}" class="form-select" id="hotelType">
                                    <option value="">Select…</option>
                                    <option th:each="type : ${hotelTypes}" th:value="${type}"
                                            th:text="${#strings.capitalizeWords(#strings.replace(#strings.toLowerCase(type), '_', ' '))}">
                                        Four Stars
                                    </option>
                                </select>
                            </div>
                            <div class="col-md-4">
                                <label for="transferType"
                                       class="form-label text-uppercase fw-semibold text-success small mb-1">Transfer
                                    type</label>
                                <select th:field="*{transferType}" class="form-select" id="transferType">
                                    <option value="">Select…</option>
                                    <option th:each="type : ${transferTypes}" th:value="${type}"
                                            th:text="${#strings.capitalizeWords(#strings.replace(#strings.toLowerCase(type), '_', ' '))}">
                                        Plane
                                    </option>
                                </select>
                            </div>

                            <div class="col-12">
                                <label for="image"
                                       class="form-label text-uppercase fw-semibold text-success small mb-1">Image</label>
                                <input type="file" th:field="*{image}" class="form-control" id="image" accept="image/*">
                            </div>

                            <div class="col-12 d-flex gap-2 mt-2">
                                <button type="submit" class="btn btn-success text-uppercase fw-semibold">Create tour
                                </button>
                                <a th:href="@{/}" class="btn btn-outline-secondary">Cancel</a>
                            </div>

                        </form>

                    </div>
                </div>

            </div>
        </div>
    </div>
</main>

<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
