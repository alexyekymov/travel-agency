<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title th:text="${tour.title}">Tour</title>
    <th:block th:replace="~{fragments/head :: assets}"></th:block>
    <style>
        .form-control:focus {
            border-color: var(--bs-success);
            box-shadow: 0 0 0 .25rem rgba(var(--bs-success-rgb), .25);
        }
    </style>
</head>
<body>

<nav th:replace="~{fragments/header :: header}"></nav>

<main class="py-5">
    <div class="container-fluid">
        <div class="row justify-content-center">
            <div class="col-lg-8">

                <a th:href="@{/}" class="text-uppercase fw-semibold text-success small text-decoration-none mb-4 d-inline-block">
                    &larr; Back to tours
                </a>

                <article class="card border-0 shadow-sm overflow-hidden">
                    <div class="row g-0">

                        <div class="col-md-7 position-relative">
                            <div class="ratio ratio-4x3 h-100">
                                <img th:if="${tour.imageName != null}"
                                     class="object-fit-cover"
                                     th:src="@{/images/{name}(name=${tour.imageName})}"
                                     th:alt="${tour.title}">
                                <div th:unless="${tour.imageName != null}"
                                     class="d-flex align-items-center justify-content-center bg-body-secondary text-muted small">
                                    No photo
                                </div>
                            </div>
                        </div>

                        <div class="col-md-5">
                            <div class="card-body d-flex flex-column h-100 p-4">

                                <p class="text-uppercase fw-semibold text-success small mb-1">Tour details</p>
                                <h1 class="h3 mb-3" th:text="${tour.title}">Tour title</h1>
                                <p class="text-muted" th:text="${tour.description}">A short description of the trip.</p>

                                <div class="d-flex flex-wrap gap-2 mt-auto pt-3 border-top">
                                    <span class="badge rounded-pill bg-success-subtle text-success-emphasis border border-success-subtle d-inline-flex align-items-center gap-1 fw-semibold text-uppercase">
                                        <i class="bi bi-compass"></i>
                                        <span th:text="${#strings.capitalizeWords(#strings.replace(#strings.toLowerCase(tour.tourType), '_', ' '))}">Leisure</span>
                                    </span>
                                    <span class="badge rounded-pill bg-success-subtle text-success-emphasis border border-success-subtle d-inline-flex align-items-center gap-1 fw-semibold text-uppercase">
                                        <i class="bi bi-building"></i>
                                        <span th:text="${#strings.capitalizeWords(#strings.replace(#strings.toLowerCase(tour.hotelType), '_', ' '))}">Four Stars</span>
                                    </span>
                                    <span class="badge rounded-pill bg-success-subtle text-success-emphasis border border-success-subtle d-inline-flex align-items-center gap-1 fw-semibold text-uppercase">
                                        <i class="bi bi-signpost-split"></i>
                                        <span th:text="${#strings.capitalizeWords(#strings.replace(#strings.toLowerCase(tour.transferType), '_', ' '))}">Plane</span>
                                    </span>
                                    <span th:if="${tour.hot}"
                                          class="badge rounded-pill text-bg-danger d-inline-flex align-items-center gap-1 fw-semibold text-uppercase">
                                        <i class="bi bi-fire"></i>
                                        <span>Hot</span>
                                    </span>
                                </div>

                                <div class="d-flex flex-wrap justify-content-between align-items-end gap-3 mt-3">
                                    <span class="fs-3 fw-semibold">
                                        <span class="text-muted fs-6">$</span><span th:text="${#numbers.formatInteger(tour.price, 1, 'COMMA')}">1,299</span>
                                    </span>

                                    <form th:action="@{/cart/add}" method="post"
                                          class="d-flex align-items-end gap-2 m-0">
                                        <input type="hidden" name="tourId" th:value="${tour.id}">
                                        <div>
                                            <label for="seats"
                                                   class="form-label text-uppercase fw-semibold text-success small mb-1">Seats</label>
                                            <input type="number" id="seats" name="seats" value="1" min="1"
                                                   class="form-control" style="width: 5rem">
                                        </div>
                                        <button type="submit"
                                                class="btn btn-success text-uppercase fw-semibold d-inline-flex align-items-center gap-2">
                                            <i class="bi bi-cart-plus"></i>Add to cart
                                        </button>
                                    </form>
                                </div>

                            </div>
                        </div>

                    </div>
                </article>

            </div>
        </div>
    </div>
</main>

<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
