<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>New tour</title>
</head>
<body>

<form th:action="@{/tours}" th:object="${tourRequest}"
      method="post" enctype="multipart/form-data">

    <input type="text"   th:field="*{title}" placeholder="Title">
    <textarea            th:field="*{description}" placeholder="Description"></textarea>
    <input type="number" step="0.01" th:field="*{price}" placeholder="Price">
    <input type="date"   th:field="*{arrivalDate}">
    <input type="date"   th:field="*{evictionDate}">
    <input type="number" th:field="*{availableSeats}" placeholder="Available seats">

    <select th:field="*{tourType}">
        <option value="" disabled>-- Tour type --</option>
        <option th:each="type : ${tourTypes}" th:value="${type}" th:text="${type}">TOUR_TYPE</option>
    </select>

    <select th:field="*{hotelType}">
        <option value="" disabled>-- Hotel type --</option>
        <option th:each="type : ${hotelTypes}" th:value="${type}" th:text="${type}">HOTEL_TYPE</option>
    </select>

    <select th:field="*{transferType}">
        <option value="" disabled>-- Transfer type --</option>
        <option th:each="type : ${transferTypes}" th:value="${type}" th:text="${type}">TRANSFER_TYPE</option>
    </select>

    <input type="file"   th:field="*{image}" accept="image/*">

    <button type="submit">Save</button>
</form>
</body>
</html>
