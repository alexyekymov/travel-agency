<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<body>

<header th:fragment="header" class="bg-light border-bottom shadow-sm py-4">
    <div class="container-fluid">
        <div class="row justify-content-center">
            <div class="col-lg-8 d-flex flex-wrap justify-content-between align-items-center gap-3">
                <a th:href="@{/}"
                   class="fs-4 fw-semibold text-success text-decoration-none d-inline-flex align-items-center gap-2">
                    <i class="bi bi-globe-americas"></i>Travel Agency
                </a>

                <div class="d-flex align-items-center gap-3">
                    <span sec:authorize="isAuthenticated()" class="text-muted small">
                        <i class="bi bi-person-circle"></i>
                        <span sec:authentication="name">user@example.com</span>
                    </span>

                    <div sec:authorize="isAnonymous()" class="d-flex gap-2">
                        <a th:href="@{/auth/sign-in}"
                           class="btn btn-outline-success text-uppercase fw-semibold">Sign in</a>
                        <a th:href="@{/auth/sign-up}"
                           class="btn btn-success text-uppercase fw-semibold">Sign up</a>
                    </div>

                    <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post" class="m-0">
                        <button type="submit"
                                class="btn btn-outline-success d-inline-flex align-items-center" title="Log out">
                            <i class="bi bi-box-arrow-right"></i>
                        </button>
                    </form>

                    <a sec:authorize="isAuthenticated()" th:href="@{/orders}"
                       class="btn btn-outline-success d-inline-flex align-items-center" title="Orders">
                        <i class="bi bi-receipt"></i>
                    </a>

                    <a sec:authorize="isAuthenticated()" th:href="@{/cart}"
                       class="btn btn-outline-success d-inline-flex align-items-center" title="Cart">
                        <i class="bi bi-cart3"></i>
                    </a>
                </div>
            </div>
        </div>
    </div>
</header>

</body>
</html>
