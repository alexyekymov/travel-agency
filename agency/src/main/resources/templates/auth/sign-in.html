<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Sign in</title>
    <link th:href="@{/css/bootstrap.min.css}" rel="stylesheet">
    <link th:href="@{/css/bootstrap-icons.min.css}" rel="stylesheet">
    <style>
        .form-control:focus {
            border-color: var(--bs-success);
            box-shadow: 0 0 0 .25rem rgba(var(--bs-success-rgb), .25);
        }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-light bg-light">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">Travel Agency</a>
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarSupportedContent">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarSupportedContent">
            <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                <li class="nav-item">
                    <a class="nav-link" href="/">Home</a>
                </li>
            </ul>
        </div>
    </div>
</nav>

<main class="py-5">
    <div class="container-fluid">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-4">

                <a th:href="@{/}"
                   class="text-uppercase fw-semibold text-success small text-decoration-none mb-4 d-inline-block">&larr;
                    Back to tours</a>

                <div class="card border-0 shadow-sm">
                    <div class="card-body p-4">

                        <p class="text-uppercase fw-semibold text-success small mb-1">Welcome back</p>
                        <h1 class="h3 mb-4">Sign in</h1>

                        <div id="error" class="alert alert-danger d-flex align-items-center gap-2 d-none">
                            <i class="bi bi-exclamation-circle"></i>
                            <span>Invalid email or password.</span>
                        </div>

                        <form id="loginForm" class="row g-3" novalidate
                              th:data-login-url="@{/api/auth/login}" th:data-home-url="@{/}">

                            <div class="col-12">
                                <label for="username"
                                       class="form-label text-uppercase fw-semibold text-success small mb-1">Email</label>
                                <input type="email" id="username" name="username" class="form-control"
                                       placeholder="you@example.com" autocomplete="username" required>
                            </div>

                            <div class="col-12">
                                <label for="password"
                                       class="form-label text-uppercase fw-semibold text-success small mb-1">Password</label>
                                <input type="password" id="password" name="password" class="form-control"
                                       placeholder="Your password" autocomplete="current-password" required>
                            </div>

                            <div class="col-12 mt-4">
                                <button type="submit" class="btn btn-success text-uppercase fw-semibold w-100">Sign in
                                </button>
                            </div>

                        </form>

                        <p class="text-muted small text-center mb-0 mt-4">
                            Don't have an account?
                            <a href="#" class="text-success fw-semibold text-decoration-none">Sign up</a>
                        </p>

                    </div>
                </div>

            </div>
        </div>
    </div>
</main>

<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
<script th:src="@{/js/auth.js}"></script>
</body>
</html>
