<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" xmlns:sec="http://www.thymeleaf.org/extras/spring-security" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manager dashboard</title>
    <th:block th:replace="~{fragments/head :: assets}"></th:block>
    <style>
        .sort-select:focus {
            border-color: var(--bs-success);
            box-shadow: 0 0 0 .25rem rgba(var(--bs-success-rgb), .25);
        }
    </style>
</head>
<body>

<nav th:replace="~{fragments/header :: header}"></nav>

<main class="py-5">
    <div class="container-fluid">
        <div class="row justify-content-center">
            <div class="col-lg-8">

                <div class="d-flex flex-wrap justify-content-between align-items-end gap-3 mb-4">
                    <div>
                        <h1 class="h2 mb-0">Tours management</h1>
                    </div>
                    <a sec:authorize="hasRole('ADMIN')" th:href="@{/tours/new}"
                       class="btn btn-success text-uppercase fw-semibold d-inline-flex align-items-center gap-2">
                        <i class="bi bi-plus-lg"></i>New tour
                    </a>
                </div>

                <div th:if="${tours.isEmpty()}" class="text-center text-muted border rounded p-5 my-4">
                    No tours yet.
                    <a sec:authorize="hasRole('ADMIN')" th:href="@{/tours/new}"
                       class="text-success fw-semibold text-decoration-none">Create one</a>
                </div>

                <div th:unless="${tours.isEmpty()}" class="card border-0 shadow-sm">
                    <div class="table-responsive">
                        <table class="table table-hover align-middle mb-0">
                            <thead>
                            <tr class="text-uppercase small text-muted">
                                <th scope="col" class="ps-3">Tour</th>
                                <th scope="col">Type</th>
                                <th scope="col" class="text-end">Price</th>
                                <th scope="col" class="text-end pe-3">Actions</th>
                            </tr>
                            </thead>
                            <tbody>
                            <tr th:each="tour : ${tours}">

                                <td class="ps-3">
                                    <div class="d-flex align-items-center gap-3">
                                        <div class="ratio ratio-1x1 rounded overflow-hidden flex-shrink-0"
                                             style="width: 3.5rem">
                                            <img th:if="${tour.imageName != null}"
                                                 class="object-fit-cover"
                                                 th:src="@{/images/{name}(name=${tour.imageName})}"
                                                 th:alt="${tour.title}">
                                            <div th:unless="${tour.imageName != null}"
                                                 class="d-flex align-items-center justify-content-center bg-body-secondary text-muted"
                                                 style="font-size: .65rem">
                                                No photo
                                            </div>
                                        </div>
                                        <span class="fw-semibold" th:text="${tour.title}">Tour title</span>
                                    </div>
                                </td>

                                <td class="small text-muted">
                                    <span th:text="${#strings.capitalizeWords(#strings.replace(#strings.toLowerCase(tour.tourType), '_', ' '))}">Leisure</span>
                                    <span class="text-secondary opacity-50">&middot;</span>
                                    <span th:text="${#strings.capitalizeWords(#strings.replace(#strings.toLowerCase(tour.hotelType), '_', ' '))}">Four Stars</span>
                                    <span class="text-secondary opacity-50">&middot;</span>
                                    <span th:text="${#strings.capitalizeWords(#strings.replace(#strings.toLowerCase(tour.transferType), '_', ' '))}">Plane</span>
                                </td>

                                <td class="text-end fw-semibold">
                                    <span class="text-muted fs-6">$</span><span
                                        th:text="${#numbers.formatInteger(tour.price, 1, 'COMMA')}">1,299</span>
                                </td>

                                <td class="text-end pe-3">
                                    <a th:href="@{/tours/{id}/edit(id=${tour.id})}"
                                       class="btn btn-sm btn-outline-success d-inline-flex align-items-center gap-1 text-uppercase fw-semibold">
                                        <i class="bi bi-pencil"></i>Edit
                                    </a>
                                </td>

                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>

                <div th:replace="~{fragments/pagination :: pagination(${tours}, '/tours/manage')}"></div>

            </div>
        </div>
    </div>
</main>

<script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
